<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mariage Fest 2026</title>

<style>

body{
    background:#0a0f2a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.card{
    width:420px;
    height:720px;
    perspective:1200px;
    cursor:pointer;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.8s;
    transform-style:preserve-3d;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.card-face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.front{
    background:url("recto.png") center/cover no-repeat;
}

.back{
    background:url("verso.png") center/cover no-repeat;
    transform:rotateY(180deg);
}

</style>
</head>

<body>

<div class="card" onclick="this.classList.toggle('flipped')">
    <div class="card-inner">

        <div class="card-face front"></div>

        <div class="card-face back"></div>

    </div>
</div>

</body>
</html>
</html>
